<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a08"/>
      <stop offset="100%" style="stop-color:#120e08"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0b400"/>
      <stop offset="100%" style="stop-color:#d49a00"/>
    </linearGradient>
    <linearGradient id="glow3" x1="50%" y1="50%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#f0b400;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f0b400;stop-opacity:0"/>
    </linearGradient>
    <filter id="b3"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="gf3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <ellipse cx="400" cy="250" rx="350" ry="200" fill="url(#glow3)" filter="url(#b3)"/>
  <circle cx="200" cy="150" r="100" fill="#f0b400" opacity="0.03" filter="url(#b3)"/>
  <circle cx="600" cy="150" r="100" fill="#5865f2" opacity="0.03" filter="url(#b3)"/>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/><line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/><line x1="640" y1="0" x2="640" y2="500"/>
  </g>
  <!-- PC1 - Server (left) -->
  <g transform="translate(200,170)" filter="url(#gf3)">
    <rect x="-70" y="-50" width="140" height="105" rx="8" fill="#0d1015" stroke="#f0b400" stroke-width="1.2" opacity="0.8"/>
    <rect x="-70" y="-50" width="140" height="22" rx="8" fill="#f0b400" opacity="0.1"/>
    <text x="0" y="-34" text-anchor="middle" fill="#f0b400" font-size="9" font-family="monospace" font-weight="600" opacity="0.9">PC1 · SERVER</text>
    <!-- Status indicators -->
    <g transform="translate(-55,-18)">
      <circle cx="8" cy="8" r="4" fill="#00d26a" opacity="0.8"/><text x="18" y="12" fill="#8891a4" font-size="7" font-family="monospace">Fillers x7</text>
      <circle cx="8" cy="24" r="4" fill="#00d26a" opacity="0.8"/><text x="18" y="28" fill="#8891a4" font-size="7" font-family="monospace">BoBarb OK</text>
      <circle cx="8" cy="40" r="4" fill="#5865f2" opacity="0.8"/><text x="18" y="44" fill="#8891a4" font-size="7" font-family="monospace">Discord OK</text>
    </g>
  </g>
  <!-- PC2 - Agent (right) -->
  <g transform="translate(600,170)" filter="url(#gf3)">
    <rect x="-70" y="-50" width="140" height="105" rx="8" fill="#0d1015" stroke="#5865f2" stroke-width="1.2" opacity="0.8"/>
    <rect x="-70" y="-50" width="140" height="22" rx="8" fill="#5865f2" opacity="0.1"/>
    <text x="0" y="-34" text-anchor="middle" fill="#5865f2" font-size="9" font-family="monospace" font-weight="600" opacity="0.9">PC2 · YOU PLAY</text>
    <!-- Hotkey indicators -->
    <g transform="translate(-55,-18)">
      <rect x="0" y="0" width="28" height="14" rx="3" fill="#5865f2" stroke="#5865f2" stroke-width="0.5" opacity="0.25"/>
      <text x="14" y="10" text-anchor="middle" fill="#5865f2" font-size="7" font-family="monospace" opacity="0.9">F5</text>
      <text x="36" y="10" fill="#8891a4" font-size="7" font-family="monospace">Battle Orders</text>
      <rect x="0" y="18" width="28" height="14" rx="3" fill="#5865f2" stroke="#5865f2" stroke-width="0.5" opacity="0.25"/>
      <text x="14" y="28" text-anchor="middle" fill="#5865f2" font-size="7" font-family="monospace" opacity="0.9">F6</text>
      <text x="36" y="28" fill="#8891a4" font-size="7" font-family="monospace">Next Game</text>
      <rect x="0" y="36" width="28" height="14" rx="3" fill="#5865f2" stroke="#5865f2" stroke-width="0.5" opacity="0.25"/>
      <text x="14" y="46" text-anchor="middle" fill="#5865f2" font-size="7" font-family="monospace" opacity="0.9">F7</text>
      <text x="36" y="46" fill="#8891a4" font-size="7" font-family="monospace">Toggle Leeches</text>
    </g>
  </g>
  <!-- Connection line between PCs -->
  <g>
    <line x1="270" y1="170" x2="530" y2="170" stroke="#f0b400" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
    <!-- Arrow -->
    <polygon points="525,165 535,170 525,175" fill="#f0b400" opacity="0.5"/>
    <polygon points="275,165 265,170 275,175" fill="#f0b400" opacity="0.5"/>
    <!-- Label on connection -->
    <rect x="360" y="158" width="80" height="22" rx="11" fill="#0c0a08" stroke="#f0b400" stroke-width="0.8" opacity="0.6"/>
    <text x="400" y="173" text-anchor="middle" fill="#f0b400" font-size="8" font-family="monospace" opacity="0.8">INSTANT</text>
  </g>
  <!-- Discord icon below -->
  <g transform="translate(400,240)" opacity="0.4">
    <circle cx="0" cy="0" r="16" fill="#5865f2" opacity="0.15"/>
    <path d="M0-6 L6 0 L0 6 L-6 0Z" fill="#5865f2"/>
  </g>
  <!-- Crown/premium badge -->
  <g transform="translate(400,82)" opacity="0.6">
    <path d="M-12 8 L-8-4 L0 4 L8-4 L12 8Z" fill="#f0b400" stroke="#f0b400" stroke-width="0.5"/>
    <rect x="-13" y="9" width="26" height="4" rx="1" fill="#f0b400"/>
  </g>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" fill="white" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="34" font-weight="800" letter-spacing="-1">D2R 2-PC SYSTEM</text>
  <text x="400" y="400" text-anchor="middle" fill="#8891a4" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="14" font-weight="400" letter-spacing="3">SERVER + AGENT · DISCORD · D2R ROTW</text>
  <!-- Corner accents -->
  <path d="M30 30 L30 60 M30 30 L60 30" stroke="#f0b400" stroke-width="1.5" opacity="0.4" fill="none"/>
  <path d="M770 30 L770 60 M770 30 L740 30" stroke="#f0b400" stroke-width="1.5" opacity="0.4" fill="none"/>
  <path d="M30 470 L30 440 M30 470 L60 470" stroke="#f0b400" stroke-width="1.5" opacity="0.4" fill="none"/>
  <path d="M770 470 L770 440 M770 470 L740 470" stroke="#f0b400" stroke-width="1.5" opacity="0.4" fill="none"/>
</svg>
